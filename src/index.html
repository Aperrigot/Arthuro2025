<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Boutique de Plantes</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Bienvenue dans ma boutique de plantes</h1>
    </header>
    <main>
        <section class="plant-list">
            <h2>Nos Plantes</h2>
            <div class="plant" data-name="Ficus" data-price="20">
                <img src="https://via.placeholder.com/150" alt="Ficus">
                <h3>Ficus</h3>
                <p class="price">20€</p>
                <button class="add-to-cart">Ajouter au panier</button>
            </div>
            <div class="plant" data-name="Succulente" data-price="8">
                <img src="https://via.placeholder.com/150" alt="Succulente">
                <h3>Succulente</h3>
                <p class="price">8€</p>
                <button class="add-to-cart">Ajouter au panier</button>
            </div>
            <div class="plant" data-name="Monstera" data-price="25">
                <img src="https://via.placeholder.com/150" alt="Monstera">
                <h3>Monstera</h3>
                <p class="price">25€</p>
                <button class="add-to-cart">Ajouter au panier</button>
            </div>
        </section>
        <section class="cart">
            <h2>Panier</h2>
            <ul id="cart-items"></ul>
            <p id="total"></p>
        </section>
    </main>
    <script src="js/main.js"></script>
</body>
</html>
